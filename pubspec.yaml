name: gherkin_patrol
description: Lightweight Gherkin-style BDD for Flutter integration tests with Patrol.
version: 0.1.0
publish_to: "none"

environment:
  sdk: ">=3.7.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  analyzer: ^10.0.0
  build: ^4.0.0
  patrol_finders: ^3.0.0
  source_gen: ^4.2.1

dev_dependencies:
  build_runner: ^2.4.11
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
